name: CI · vaults-diagram-tools

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Refresh offline vendor runtime
        run: npm run vendor:refresh
      - name: Test offline vendor runtime
        run: npm run test:vendor:offline
      - name: Audit offline runtime
        run: npm run audit:vendor:offline-runtime
      - name: Dry-run npm package
        run: npm pack --dry-run
      - name: Build zip package
        run: npm run package:zip
      - name: Build container image
        run: docker build -f containers/Containerfile -t vaults-diagram-tools:ci .
      - name: Write branded summary
        if: always()
        run: |
          {
            echo '![vaults-diagram-tools Actions banner](https://malnati.github.io/vaults-diagram-tools/assets/brand/actions-banner.png)'
            echo
            echo '### vaults-diagram-tools CI'
            echo 'Mermaid to assets. Source code to maps. MCP for agents.'
          } >> "$GITHUB_STEP_SUMMARY"
