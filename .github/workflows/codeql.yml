name: CodeQL · vaults-diagram-tools

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
      - name: Write branded summary
        if: always()
        run: |
          {
            echo '![vaults-diagram-tools Actions banner](https://malnati.github.io/vaults-diagram-tools/assets/brand/actions-banner.png)'
            echo
            echo '### vaults-diagram-tools CodeQL'
            echo 'Mermaid to assets. Source code to maps. MCP for agents.'
          } >> "$GITHUB_STEP_SUMMARY"
