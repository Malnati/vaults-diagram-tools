name: Release · vaults-diagram-tools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Refresh offline vendor runtime
        run: npm run vendor:refresh
      - name: Test offline vendor runtime
        run: npm run test:vendor:offline
      - name: Build package artifacts
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          npm run package:zip
      - name: Build container image
        run: docker build -f containers/Containerfile -t vaults-diagram-tools:release .
      - name: Write branded summary
        if: always()
        run: |
          {
            echo '![vaults-diagram-tools Actions banner](https://malnati.github.io/vaults-diagram-tools/assets/brand/actions-banner.png)'
            echo
            echo '### vaults-diagram-tools Release'
            echo 'Release workflow validates and packages artifacts only. External registries are published manually from a local authenticated terminal.'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Install VS Code extension dependencies
        run: npm run vscode:install
      - name: Test VS Code extension
        run: npm run vscode:test
      - name: Package VS Code extension
        run: npm run vscode:package
      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ![vaults-diagram-tools release banner](https://raw.githubusercontent.com/Malnati/vaults-diagram-tools/main/docs/assets/brand/release-banner.png)

            Mermaid to assets. Source code to maps. MCP for agents.

            Release artifacts preserve the npm tarball handoff, zip handoff, VS Code extension VSIX, notices, and the deterministic brand kit. npm, VS Code Marketplace, Open VSX, container registries, and MCP Registry publication are manual terminal operations.
          files: |
            dist/*.tgz
            dist/*.zip
            dist/*.vsix
      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Validate MCP Registry metadata
        run: ./mcp-publisher validate
