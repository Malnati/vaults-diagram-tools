name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Refresh offline vendor runtime
        run: npm run vendor:refresh
      - name: Test offline vendor runtime
        run: npm run test:vendor:offline
      - name: Build package artifacts
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          npm run package:zip
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vaults-diagram-tools
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tgz
            dist/*.zip
      - name: Publish npm package
        if: env.NPM_TOKEN != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Wait for npm package availability
        run: |
          version="$(node -p "require('./package.json').version")"
          for attempt in $(seq 1 12); do
            if npm view "vaults-diagram-tools@${version}" version; then
              exit 0
            fi
            echo "npm package vaults-diagram-tools@${version} not visible yet; retry ${attempt}/12"
            sleep 10
          done
          npm view "vaults-diagram-tools@${version}" version
      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Validate MCP Registry metadata
        run: ./mcp-publisher validate
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish MCP Registry metadata
        run: ./mcp-publisher publish
