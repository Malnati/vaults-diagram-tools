name: Release · vaults-diagram-tools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Refresh offline vendor runtime
        run: npm run vendor:refresh
      - name: Test offline vendor runtime
        run: npm run test:vendor:offline
      - name: Build package artifacts
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          npm run package:zip
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vaults-diagram-tools
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Check npm package publication status
        id: npm_package
        run: |
          version="$(node -p "require('./package.json').version")"
          if npm view "vaults-diagram-tools@${version}" version; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Write branded summary
        if: always()
        run: |
          {
            echo '![vaults-diagram-tools Actions banner](https://malnati.github.io/vaults-diagram-tools/assets/brand/actions-banner.png)'
            echo
            echo '### vaults-diagram-tools Release'
            echo 'Release notes use docs/assets/brand/release-banner.png.'
            echo
            echo "npm registry visible before asset upload: ${{ steps.npm_package.outputs.exists }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Install VS Code extension dependencies
        run: npm run vscode:install
      - name: Test VS Code extension
        run: npm run vscode:test
      - name: Package VS Code extension
        run: npm run vscode:package
      - name: Write external registry summary
        run: |
          version="$(node -p "require('./package.json').version")"
          {
            echo
            echo '### External registry publication'
            echo
            echo 'GitHub Actions intentionally does not read `NPM_TOKEN`, `VSCE_PAT`, or `OVSX_PAT`.'
            if [[ "${{ steps.npm_package.outputs.exists }}" == "true" ]]; then
              echo "- npm: vaults-diagram-tools@${version} is visible on npm."
            else
              echo "- npm: publish manually from an authenticated local shell when ready."
            fi
            echo "- VS Code Marketplace: publish manually from an authenticated local shell."
            echo "- Open VSX: publish manually from an authenticated local shell."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ![vaults-diagram-tools release banner](https://raw.githubusercontent.com/Malnati/vaults-diagram-tools/main/docs/assets/brand/release-banner.png)

            Mermaid to assets. Source code to maps. MCP for agents.

            Release artifacts preserve the npm tarball handoff, zip handoff, GHCR image metadata, VS Code extension VSIX, notices, and the deterministic brand kit.
          files: |
            dist/*.tgz
            dist/*.zip
            dist/*.vsix
      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Validate MCP Registry metadata
        run: ./mcp-publisher validate
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish MCP Registry metadata
        run: ./mcp-publisher publish
