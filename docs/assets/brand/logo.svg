<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-label="vaults-diagram-tools logo">
  <defs>
    <linearGradient id="brand-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123247"/>
      <stop offset="0.48" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#251d48"/>
    </linearGradient>
    <linearGradient id="brand-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="brand-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#94a3b8" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="none"/>
  <g transform="translate(24 34)">
    <g>
    <rect width="192" height="192" rx="30" fill="url(#brand-bg)" filter="url(#soft-shadow)"/>
    <rect x="0.5" y="0.5" width="191" height="191" rx="30" fill="none" stroke="#67e8f9" stroke-opacity="0.36"/>
    <rect width="192" height="192" fill="url(#brand-grid)" opacity="0.9"/>
    <path d="M42 112 L82 62 L108 132 L150 82" fill="none" stroke="url(#brand-accent)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="42" cy="112" r="11" fill="#67e8f9"/>
    <circle cx="82" cy="62" r="11" fill="#a78bfa"/>
    <circle cx="108" cy="132" r="11" fill="#67e8f9"/>
    <circle cx="150" cy="82" r="11" fill="#a78bfa"/>
  </g>
  </g>
  <text x="252" y="116" fill="#f8fafc" font-family="DejaVu Sans, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-2">vaults-diagram-tools</text>
  <text x="256" y="168" fill="#67e8f9" font-family="DejaVu Sans Mono, monospace" font-size="25" font-weight="700">Mermaid to assets. Source code to maps. MCP for agents.</text>
  <text x="256" y="210" fill="#cbd5e1" font-family="DejaVu Sans, Arial, sans-serif" font-size="22">Portable Mermaid, source-code diagrams, and MCP workflows.</text>

</svg>
